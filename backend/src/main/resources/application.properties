# Application Name
spring.application.name=Smart Campus Hub

# ================================
# Supabase PostgreSQL Configuration
# ================================
# PASTE YOUR JDBC URL HERE (Copy it from Supabase Dashboard -> Connect -> JDBC)
# Using direct connection to avoid PgBouncer timeout issues with Spring Boot
spring.datasource.url=jdbc:postgresql://db.jzvhjnjhqqldtfzspqtn.supabase.co:5432/postgres?sslmode=require
spring.datasource.username=postgres
spring.datasource.password=SMARThub@1122
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=3

# HikariCP settings to prevent connection drops from Supabase
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ================================
# JPA / Hibernate Configuration
# ================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ================================
# Server Configuration
# ================================
server.port=8080

